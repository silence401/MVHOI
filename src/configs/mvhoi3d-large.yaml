__object__:
  path: model.mvhoi
  name: MVHOI3DNet
  args: as_params

net:
  __object__:
    path: model.dinov2.dinov2
    name: DinoV2
    args: as_params

  name: vitl
  out_layers: [11, 15, 19, 23]
  alt_start: 8
  qknorm_start: 8
  rope_start: 8
  cat_token: true

head:
  __object__:
    path: model.dualdpt
    name: DualDPT
    args: as_params

  dim_in: 2048
  output_dim: 2
  features: 256
  out_channels: [256, 512, 1024, 1024]

cam_enc:
  __object__:
    path: model.cam_enc
    name: CameraEnc
    args: as_params

  dim_out: 1024

cam_dec:
  __object__:
    path: model.cam_dec
    name: CameraDec
    args: as_params

  dim_in: 2048
